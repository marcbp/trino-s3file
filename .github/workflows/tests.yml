name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and test with Maven
        run: mvn -B -ntp test

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Start Trino and MinIO
        run: docker compose up -d --build minio trino-coordinator trino-worker

      - name: Wait for Trino
        run: |
          curl --fail --silent --show-error \
            --retry 30 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 2 \
            --max-time 5 \
            http://localhost:8080/v1/info >/dev/null

      - name: Run SQL integration tests
        run: mvn -B -ntp -DskipUnitTests=true -Pintegration-tests -Dtrino.base-url=http://localhost:8080 -Ds3.endpoint=http://localhost:9000 verify

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs --no-color
